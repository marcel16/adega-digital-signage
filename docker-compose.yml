version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adega-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adega_signage}
      POSTGRES_USER: ${POSTGRES_USER:-adega}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adega_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adega} -d ${POSTGRES_DB:-adega_signage}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: adega-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-adega_redis_2024}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: adega-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-adega}:${POSTGRES_PASSWORD:-adega_secret_2024}@postgres:5432/${POSTGRES_DB:-adega_signage}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-adega_redis_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      ARGON2_SECRET: ${ARGON2_SECRET:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3001}
      API_URL: ${API_URL:-http://localhost:4000}
      IPTV_URL: ${IPTV_URL:-http://localhost:4001}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: /app/storage/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:4000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@adegasignage.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
    volumes:
      - storage_data:/app/storage
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: adega-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-adega}:${POSTGRES_PASSWORD:-adega_secret_2024}@postgres:5432/${POSTGRES_DB:-adega_signage}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-adega_redis_2024}@redis:6379
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      UPLOAD_DIR: /app/storage/uploads
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: adega-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_IPTV_URL: ${IPTV_URL:-http://localhost:4001}
      NEXT_PUBLIC_STORAGE_URL: ${STORAGE_URL:-http://localhost:4000/storage}
      NEXT_PUBLIC_APP_NAME: "Adega Signage"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: adega-admin
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-http://localhost:3001}
      NEXT_PUBLIC_STORAGE_URL: ${STORAGE_URL:-http://localhost:4000/storage}
      NEXT_PUBLIC_APP_NAME: "Adega Signage Admin"
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    depends_on:
      - api
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iptv:
    build:
      context: ./apps/iptv
      dockerfile: Dockerfile
    container_name: adega-iptv
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4001
      API_URL: ${API_URL:-http://api:4000}
      REDIS_URL: redis://:${REDIS_PASSWORD:-adega_redis_2024}@redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET}
      IPTV_SECRET: ${JWT_SECRET}
      TOKEN_EXPIRATION: 3600
    ports:
      - "${IPTV_PORT:-4001}:4001"
    depends_on:
      - api
      - redis
    networks:
      - adega-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  storage_data:

networks:
  adega-network:
    driver: bridge